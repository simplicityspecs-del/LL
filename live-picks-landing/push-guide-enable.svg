<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1280" viewBox="0 0 430 640" role="img" aria-labelledby="title desc">
  <title id="title">Enable push notifications setup step</title>
  <desc id="desc">A simplified Home Screen app view showing that users should log in from the Home Screen icon and enable push notifications on the Premium Feed.</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0e120f" flood-opacity="0.16"/>
    </filter>
    <filter id="panel" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="-10" stdDeviation="16" flood-color="#0e120f" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="430" height="640" fill="#f8faf8"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g font-weight="900" fill="#050506">
      <text x="22" y="25" font-size="15">6:31</text>
      <rect x="388" y="17" width="4" height="7" rx="2" opacity="0.42"/>
      <rect x="395" y="14" width="4" height="10" rx="2" opacity="0.58"/>
      <rect x="402" y="11" width="4" height="13" rx="2" opacity="0.76"/>
      <rect x="409" y="8" width="4" height="16" rx="2"/>
    </g>
    <g transform="translate(38 58)">
      <g transform="translate(0 0)">
        <rect x="0" y="0" width="52" height="52" rx="14" fill="#fff" stroke="#dce2dd"/>
        <text x="26" y="32" text-anchor="middle" font-size="17" font-weight="950" fill="#68706a">M</text>
        <text x="26" y="70" text-anchor="middle" font-size="11" font-weight="850" fill="#050506">Mail</text>
      </g>
      <g transform="translate(100 0)">
        <rect x="0" y="0" width="52" height="52" rx="14" fill="#fff" stroke="#dce2dd"/>
        <text x="26" y="32" text-anchor="middle" font-size="17" font-weight="950" fill="#68706a">C</text>
        <text x="26" y="70" text-anchor="middle" font-size="11" font-weight="850" fill="#050506">Calendar</text>
      </g>
      <g transform="translate(200 0)">
        <rect x="-7" y="-7" width="66" height="66" rx="20" fill="#dff4eb"/>
        <rect x="0" y="0" width="52" height="52" rx="14" fill="#050506"/>
        <text x="26" y="32" text-anchor="middle" font-size="17" font-weight="950" letter-spacing="-0.8" fill="#fff">LP</text>
        <text x="26" y="70" text-anchor="middle" font-size="11" font-weight="850" fill="#050506">Live Picks</text>
      </g>
      <g transform="translate(300 0)">
        <rect x="0" y="0" width="52" height="52" rx="14" fill="#fff" stroke="#dce2dd"/>
        <text x="26" y="32" text-anchor="middle" font-size="17" font-weight="950" fill="#68706a">S</text>
        <text x="26" y="70" text-anchor="middle" font-size="11" font-weight="850" fill="#050506">Safari</text>
      </g>
    </g>
    <g transform="translate(46 180)" filter="url(#shadow)">
      <rect width="338" height="146" rx="16" fill="#fff" stroke="#dce2dd"/>
      <text x="169" y="31" text-anchor="middle" font-size="17" font-weight="900" letter-spacing="-0.4" fill="#050506">"Live Picks" Would Like to Send</text>
      <text x="169" y="51" text-anchor="middle" font-size="17" font-weight="900" letter-spacing="-0.4" fill="#050506">Notifications</text>
      <text x="169" y="76" text-anchor="middle" font-size="13" fill="#555d57">Notifications may include alerts, sounds and</text>
      <text x="169" y="93" text-anchor="middle" font-size="13" fill="#555d57">badges.</text>
      <line x1="0" y1="104" x2="338" y2="104" stroke="#dce2dd"/>
      <line x1="169" y1="104" x2="169" y2="146" stroke="#dce2dd"/>
      <text x="84.5" y="132" text-anchor="middle" font-size="15" font-weight="850" fill="#050506">Don't Allow</text>
      <rect x="169" y="104" width="169" height="42" fill="#eff8f3"/>
      <text x="253.5" y="132" text-anchor="middle" font-size="15" font-weight="850" fill="#1f8a53">Allow</text>
    </g>
    <g transform="translate(22 472)" filter="url(#panel)">
      <rect width="386" height="146" rx="18" fill="#fff" stroke="#dce2dd"/>
      <text x="16" y="36" font-size="25" font-weight="950" letter-spacing="-1.5" fill="#050506">Premium feed.</text>
      <text x="16" y="60" font-size="13" fill="#555d57">Open Live Picks from the Home Screen icon,</text>
      <text x="16" y="78" font-size="13" fill="#555d57">log in, then tap this button on the feed.</text>
      <rect x="16" y="98" width="354" height="44" rx="9" fill="#050506"/>
      <text x="193" y="126" text-anchor="middle" font-size="13" font-weight="950" letter-spacing="0.7" fill="#fff">ENABLE PUSH NOTIFICATIONS</text>
    </g>
  </g>
</svg>
