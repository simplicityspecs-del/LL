<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1280" viewBox="0 0 430 640" role="img" aria-labelledby="title desc">
  <title id="title">Add to Home Screen setup step</title>
  <desc id="desc">A simplified iPhone share sheet showing Add to Home Screen highlighted.</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="-10" stdDeviation="18" flood-color="#0e120f" flood-opacity="0.16"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#2fba73" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="430" height="640" fill="#f8faf8"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g font-weight="900" fill="#050506">
      <text x="22" y="25" font-size="15">6:30</text>
      <rect x="388" y="17" width="4" height="7" rx="2" opacity="0.42"/>
      <rect x="395" y="14" width="4" height="10" rx="2" opacity="0.58"/>
      <rect x="402" y="11" width="4" height="13" rx="2" opacity="0.76"/>
      <rect x="409" y="8" width="4" height="16" rx="2"/>
    </g>
    <g transform="translate(20 58)">
      <text x="0" y="21" font-size="17" font-weight="950" letter-spacing="-0.8" fill="#050506">Live Picks</text>
      <rect x="337" y="-1" width="52" height="28" rx="8" fill="#fff" stroke="#dce2dd"/>
      <text x="352" y="18" font-size="11" font-weight="850" fill="#303632">Feed</text>
      <line x1="0" y1="40" x2="390" y2="40" stroke="#dce2dd"/>
      <text x="0" y="102" font-size="32" font-weight="950" letter-spacing="-2.2" fill="#050506">Install the app icon.</text>
      <text x="0" y="130" font-size="16" fill="#555d57">Use the iPhone share sheet to place Live Picks</text>
      <text x="0" y="151" font-size="16" fill="#555d57">on your Home Screen.</text>
    </g>
    <g transform="translate(18 300)" filter="url(#shadow)">
      <rect width="394" height="286" rx="22" fill="#f7f8f6" stroke="#dce2dd"/>
      <rect x="169" y="17" width="52" height="5" rx="2.5" fill="#c7cec8"/>
      <rect x="18" y="36" width="52" height="52" rx="14" fill="#050506"/>
      <text x="44" y="67" text-anchor="middle" font-size="17" font-weight="950" letter-spacing="-0.8" fill="#fff">LP</text>
      <text x="82" y="60" font-size="18" font-weight="900" fill="#050506">Live Picks</text>
      <text x="82" y="79" font-size="12" fill="#68706a">livepicks.app</text>
      <line x1="18" y1="102" x2="376" y2="102" stroke="#dce2dd"/>
      <rect x="18" y="114" width="30" height="30" rx="8" fill="#fff" stroke="#dce2dd"/>
      <text x="33" y="135" text-anchor="middle" font-size="16" font-weight="950" fill="#050506">C</text>
      <text x="60" y="136" font-size="17" font-weight="760" fill="#303632">Copy</text>
      <g filter="url(#glow)">
        <rect x="12" y="158" width="370" height="58" rx="12" fill="#ecf8f2" stroke="#9edfc2"/>
        <rect x="24" y="172" width="30" height="30" rx="8" fill="#fff" stroke="#dce2dd"/>
        <text x="39" y="193" text-anchor="middle" font-size="16" font-weight="950" fill="#050506">+</text>
        <text x="60" y="193" font-size="17" font-weight="900" fill="#050506">Add to Home Screen</text>
      </g>
      <line x1="18" y1="230" x2="376" y2="230" stroke="#dce2dd"/>
      <rect x="18" y="240" width="30" height="30" rx="8" fill="#fff" stroke="#dce2dd"/>
      <text x="33" y="261" text-anchor="middle" font-size="16" font-weight="950" fill="#050506">R</text>
      <text x="60" y="262" font-size="17" font-weight="760" fill="#303632">Add to Reading List</text>
    </g>
  </g>
</svg>
